# GlyphStream — single-service compose for self-hosted deployment.
#
# Designed for the NAS / homelab path: drop next to a `.env` and a
# `config.toml`, run `docker compose up -d`, and you're online.
#
# Volumes:
#   ./data           SQLite DB + generated media. Survives `up/down`.
#                    Migrate to a different host by copying this dir.
#   ./config.toml    Endpoint registry. Mounted read-only since the
#                    container shouldn't be editing it.
#   ./imports        Drop OWUI export files here for one-shot imports
#                    via `docker compose exec` — see README. Read-only
#                    because the script only reads from it.

services:
  glyphstream:
    # `build: .` for local builds; for production deploys you can swap
    # to `image: ghcr.io/xiphux/glyphstream:latest` (or whatever you
    # publish to) and drop the build block.
    build:
      context: .
      dockerfile: Dockerfile
    image: glyphstream:latest
    container_name: glyphstream
    restart: unless-stopped
    # Give adapter-node's SHUTDOWN_TIMEOUT (30s) room to drain in-flight
    # requests, close connections, and run the sveltekit:shutdown handler
    # before the supervisor SIGKILLs. 40s > 30s so the handler has a
    # margin even if closeAllConnections fires near the timeout.
    stop_grace_period: 40s
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      - ./data:/app/data
      - ./config.toml:/app/config.toml:ro
      - ./imports:/app/imports:ro
    env_file:
      - .env
    environment:
      # Override the few values that need container-specific defaults.
      # Anything else lives in .env so secrets stay out of compose.
      HOST: 0.0.0.0
      PORT: 3000

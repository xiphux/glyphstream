# GlyphStream CI — runs unit + e2e tests.
#
# Triggers:
#   - Direct on push to any branch except `main` and tags. Feature-
#     branch pushes get fast feedback without a Docker build piggy-
#     backing.
#   - Direct on every PR. Drives the PR checks UI.
#   - Indirect via `workflow_call` from docker.yml on `main` pushes
#     and `v*.*.*` tags, so the docker build/publish + GitHub release
#     are explicitly gated on tests passing.
#
# This split avoids running tests twice on `main` pushes (which would
# happen if both this workflow's `push` trigger AND docker.yml's
# trigger fired on the same commit).
name: CI

on:
  push:
    branches-ignore: [main]
    tags-ignore: ['**']
  pull_request:
  workflow_call:

# Only run one CI per branch at a time — cancel any in-flight runs
# when a new commit lands so we're not paying for stale results.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit + type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 'latest'
          cache: pnpm

      # --ignore-scripts: pnpm 10 blocks unapproved native-module
      # builds in CI even when pnpm.onlyBuiltDependencies lists them.
      # Rebuild explicitly afterward — that's the documented bypass.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build native modules
        run: pnpm rebuild better-sqlite3 esbuild

      - name: Type-check
        run: pnpm check

      - name: Unit tests
        run: pnpm test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 'latest'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build native modules
        run: pnpm rebuild better-sqlite3 esbuild

      # Cache Playwright browser binaries across runs. Keyed on the
      # version string from the installed @playwright/test so the
      # cache invalidates when the package bumps; rehydrates for free
      # otherwise.
      - name: Resolve Playwright version
        id: pw
        run: |
          version=$(node -p "require('./node_modules/@playwright/test/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      # On a cache hit, browser binaries are present but the apt-get
      # system deps might not be — install just those.
      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

      # On failure, attach the Playwright HTML report + traces so the
      # PR author can debug without re-running locally.
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  dependabot-automerge:
    name: Dependabot auto-merge
    needs: [unit, e2e]
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fetch update metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      # Merge only semver-safe bumps: any patch, plus minors on packages already
      # >= 1.0. Genuine majors and 0.x-minors (which can break, e.g. esbuild) are
      # left open for manual review.
      - name: Merge safe updates
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-patch' || (steps.meta.outputs.update-type == 'version-update:semver-minor' && !startsWith(steps.meta.outputs.previous-version, '0.')) }}
        run: gh pr merge --merge --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# Build + publish Docker images to GitHub Container Registry.
#
# Tag schemes:
#   - Push to main:        `main` (rolling) + `sha-<7chars>` (immutable per commit)
#   - Push tag vX.Y.Z:     `X.Y.Z`, `X.Y`, `X`, `latest`  + GitHub Release with
#                          auto-generated notes (categorized via .github/release.yml)
#
# Multi-arch (linux/amd64 + linux/arm64) so the same image works on x86
# hosts and Synology / Raspberry Pi-class ARM boxes. Uses GitHub's native
# ARM runners (`ubuntu-22.04-arm`) per architecture rather than QEMU
# emulation — modern Node + QEMU has known instability that crashes
# mid-build.
# Each arch builds a digest-only image, then a merge job stitches them
# into a single multi-arch manifest with the canonical tags. Tags appear
# atomically: consumers never see a half-published `latest`.
name: Docker

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false # never abort a release mid-publish

permissions:
  contents: read
  packages: write

env:
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # Gate everything on the full test suite. Reusable workflow so the
  # test definition lives in one place; appears as nested sub-jobs in
  # the GitHub UI and short-circuits build/merge/release on any failure.
  tests:
    name: Tests
    uses: ./.github/workflows/ci.yml

  build:
    name: Build (${{ matrix.platform }})
    needs: tests
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      # Slugify the platform string for filenames ("linux/amd64" → "linux-amd64").
      - name: Prepare platform pair
        id: prepare
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          echo "pair=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # We don't apply tags here — the merge job below tags the final
      # multi-arch manifest. Per-arch builds get a labels-only metadata
      # pass to populate OCI annotations (org.opencontainers.image.*).
      - name: Compute labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}

      - name: Build + push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          # `push-by-digest=true` writes the image to the registry
          # without applying any tag. The merge job stitches both
          # arch digests under the canonical tag set.
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          # GHA cache shared per-arch (separate keys) so amd64 + arm64
          # don't fight over the same cache entries.
          cache-from: type=gha,scope=build-${{ steps.prepare.outputs.pair }}
          cache-to: type=gha,mode=max,scope=build-${{ steps.prepare.outputs.pair }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest='${{ steps.build.outputs.digest }}'
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ steps.prepare.outputs.pair }}
          path: /tmp/digests/*
          retention-days: 1
          if-no-files-found: error

  merge:
    name: Merge multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute the actual tag set for this trigger:
      #   - branch=main pushes ⇒ `main` + `sha-<7chars>`
      #   - vX.Y.Z tag pushes  ⇒ `X.Y.Z`, `X.Y`, `X`, `latest`
      - name: Compute Docker tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      # Stitch the per-arch digests into a single multi-arch manifest
      # with all the computed tags. `imagetools create` is atomic — every
      # tag updates simultaneously when the command returns.
      - name: Create manifest list + push tags
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}

  release:
    # Only on a vX.Y.Z tag push, and only after tests + build + merge succeeded.
    name: GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [tests, build, merge]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      REPO: ${{ github.repository }}
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so the auto-changelog has prior tags to diff against

      - name: Build release body
        id: body
        run: |
          {
            echo 'body<<EOF'
            echo "## Container images"
            echo
            echo '```'
            echo "docker pull ghcr.io/${REPO}:${TAG#v}"
            echo "docker pull ghcr.io/${REPO}:latest"
            echo '```'
            echo
            echo 'Multi-arch: `linux/amd64`, `linux/arm64`.'
            echo
            echo '---'
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body: ${{ steps.body.outputs.body }}

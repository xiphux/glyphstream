# Build + publish Docker images to GitHub Container Registry.
#
# Two tag schemes:
#   - Push to main: `main` (rolling) + `sha-<7chars>` (immutable per commit).
#   - Push semver tag (vX.Y.Z): `X.Y.Z`, `X.Y`, `X`, `latest` + a GitHub
#     Release with auto-generated notes (PRs since the previous tag,
#     categorized by .github/release.yml).
#
# Multi-arch (linux/amd64 + linux/arm64) so the same image works on
# x86 hosts and Synology / Raspberry Pi-class ARM boxes.
name: Docker

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false # never abort a release mid-publish

permissions:
  contents: read
  packages: write

jobs:
  # Run the full CI suite (type-check + unit + e2e) before we publish
  # anything. Reuses ci.yml via workflow_call so the test definition
  # lives in exactly one place. The tests appear as sub-jobs of this
  # workflow run in the GitHub UI; if any fail, build + release skip.
  tests:
    name: Tests
    uses: ./.github/workflows/ci.yml

  build:
    name: Build + push
    needs: tests
    runs-on: ubuntu-latest
    outputs:
      image-name: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      # buildx for multi-arch + GHA cache backend.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute the right tag set for this trigger.
      #   - branch=main pushes ⇒ `main` + `sha-<7chars>`
      #   - vX.Y.Z tag pushes  ⇒ `X.Y.Z`, `X.Y`, `X`, `latest`
      - name: Compute Docker tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache via GitHub Actions cache backend. mode=max so
          # all stages (builder + proddeps + runtime) get cached, not
          # just the final stage.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    # Only on a vX.Y.Z tag push, and only after tests + build succeeded.
    name: GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [tests, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      REPO: ${{ github.repository }}
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the auto-changelog has prior tags to diff against

      - name: Build release body
        id: body
        run: |
          {
            echo 'body<<EOF'
            echo "## Container images"
            echo
            echo '```'
            echo "docker pull ghcr.io/${REPO}:${TAG#v}"
            echo "docker pull ghcr.io/${REPO}:latest"
            echo '```'
            echo
            echo 'Multi-arch: `linux/amd64`, `linux/arm64`.'
            echo
            echo '---'
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: ${{ steps.body.outputs.body }}

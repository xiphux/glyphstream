# Keep GitHub Actions pins current. Workflow actions are pinned to commit
# SHAs (see ghcr-cleanup.yml for why — destructive actions shouldn't float
# on a tag), which means manual bumps go stale silently. Dependabot opens a
# PR whenever a used action ships a new release, updating the SHA and the
# trailing `# vX.Y.Z` comment so the bump is reviewed rather than auto-applied.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

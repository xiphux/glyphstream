<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<!-- viewport-fit=cover gives content access to the iOS safe-area insets,
			 which we then opt back out of in component CSS where needed. -->
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, viewport-fit=cover"
		/>
		<meta name="text-scale" content="scale" />
		<!-- PWA: theme drives the iOS status bar tint when installed. -->
		<meta name="theme-color" content="#0f172a" />
		<!-- iOS PWA-specific hints. apple-touch-icon is the home-screen icon
			 because iOS still doesn't honor SVG icons in the web manifest. -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="GlyphStream" />
		<link rel="apple-touch-icon" href="/icon.svg" />
		<link rel="manifest" href="/manifest.webmanifest" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>

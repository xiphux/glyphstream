<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<!-- viewport-fit=cover gives content access to the iOS safe-area insets,
			 which we then opt back out of in component CSS where needed. -->
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="text-scale" content="scale" />
		<!-- Resolve the color scheme before first paint (no FOUC). Reads the
			 gs-scheme cookie (mirror of the user's pref): 'light'/'dark' force
			 that scheme; anything else ('system'/absent) follows the OS. Dark
			 mode keys off this data-scheme attribute — see app.css. -->
		<script>
			(function () {
				try {
					var m = document.cookie.match(/(?:^|;\s*)gs-scheme=([^;]+)/);
					var pref = m ? m[1] : 'system';
					var dark =
						pref === 'dark' ||
						(pref !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
					document.documentElement.dataset.scheme = dark ? 'dark' : 'light';
				} catch (e) {
					/* leave unset → CSS falls back to light */
				}
			})();
			// Frosted glass needs a GPU that actually renders backdrop-filter
			// blur; integrated GPUs (e.g. Intel on Windows) often don't, where
			// the low-opacity frost just bleeds content through. @supports
			// can't tell — it's syntax-only — so probe the real GPU via the
			// WebGL renderer string and only opt INTO the glassy low-opacity
			// (data-blur="rich") for GPUs known to frost well. Anything
			// unknown/masked stays on the readable default. Cached in a cookie
			// so the WebGL probe runs at most once.
			(function () {
				try {
					var c = document.cookie.match(/(?:^|;\s*)gs-blur=([^;]+)/);
					var blur = c ? c[1] : null;
					if (!blur) {
						var cv = document.createElement('canvas');
						var gl = cv.getContext('webgl') || cv.getContext('experimental-webgl');
						var rich = false;
						if (gl) {
							var dbg = gl.getExtension('WEBGL_debug_renderer_info');
							if (dbg) {
								var r = String(gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) || '').toLowerCase();
								rich = /apple|nvidia|geforce|rtx|gtx|radeon rx|radeon pro/.test(r);
							}
						}
						blur = rich ? 'rich' : 'plain';
						document.cookie = 'gs-blur=' + blur + '; path=/; max-age=31536000; samesite=lax';
					}
					if (blur === 'rich') document.documentElement.dataset.blur = 'rich';
				} catch (e) {
					/* leave unset → readable default */
				}
			})();
		</script>
		<!-- PWA: theme-color drives the iOS status bar tint when installed.
			 Cold-load default (Signature light); syncThemeColorMeta() updates
			 it to the active theme + scheme's surface once the app mounts. -->
		<meta name="theme-color" content="#fafafa" />
		<!-- iOS PWA-specific hints. iOS doesn't honor SVG for apple-touch-icon
			 OR the manifest icons, so the home-screen icon AND the
			 auto-generated launch splash (icon centered on background_color)
			 both need a raster PNG — without one iOS falls back to a page
			 screenshot for the icon and a blank dark splash. Full-bleed
			 (no rounded corners); iOS applies its own squircle mask. -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<!-- Status bar style. We deliberately DON'T use `black-translucent`
			 (the edge-to-edge look where content renders under the status bar):
			 combined with viewport-fit=cover it makes iOS miscompute the
			 standalone viewport height on a cold launch, leaving an
			 intermittent dead bar at the bottom that no JS reliably heals.
			 An opaque bar gives a stable viewport rectangle. iOS offers no
			 arbitrary color here (it ignores theme-color for the standalone
			 status bar) — only default/black/black-translucent — so we track
			 light/dark, not the per-theme hue: `black` is the safe baseline
			 (also matches the dark launch splash) and hooks.server.ts swaps it
			 to `default` (light bar) when the gs-scheme cookie is 'light'. -->
		<meta name="apple-mobile-web-app-status-bar-style" content="black" />
		<meta name="apple-mobile-web-app-title" content="GlyphStream" />
		<!-- Browser tab favicon. Without this, browsers fall back to /favicon.ico
			 (which we don't ship) and end up showing whatever they previously
			 cached for the domain — including a stale icon left over from an
			 app that used to live at the same origin. apple-touch-icon below
			 is a separate mechanism (iOS home-screen install icon), not a
			 substitute for this. -->
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/manifest.webmanifest" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>

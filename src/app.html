<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<!-- viewport-fit=cover gives content access to the iOS safe-area insets,
			 which we then opt back out of in component CSS where needed. -->
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, viewport-fit=cover"
		/>
		<meta name="text-scale" content="scale" />
		<!-- PWA: theme-color drives the iOS status bar tint when installed.
			 Two media-scoped tags so light/dark cold-load correctly; values
			 are the Signature surface colors (neutral-50 / neutral-950). -->
		<meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
		<!-- iOS PWA-specific hints. apple-touch-icon is the home-screen icon
			 because iOS still doesn't honor SVG icons in the web manifest. -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="GlyphStream" />
		<!-- Browser tab favicon. Without this, browsers fall back to /favicon.ico
			 (which we don't ship) and end up showing whatever they previously
			 cached for the domain — including a stale icon left over from an
			 app that used to live at the same origin. apple-touch-icon below
			 is a separate mechanism (iOS home-screen install icon), not a
			 substitute for this. -->
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="apple-touch-icon" href="/icon.svg" />
		<link rel="manifest" href="/manifest.webmanifest" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>

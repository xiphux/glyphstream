<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    GlyphStream mark. A custom abstract glyph: a vertical spine with a
    semicircular bow opening to the right, then a smaller stream-line
    trailing below. Reads as a character from an unknown writing system —
    the upper bow is the "letter" half (Glyph), the trailing line is the
    "stream" half. Bold strokes with rounded caps so it scales cleanly
    from favicon to home-screen icon to splash screen.

    Stroke is a vertical gradient in the Signature theme's sky-blue accent
    (hue 242): brighter at the spine top, deepening toward the trailing
    stream line so the glyph reads as "flowing" downward. This is the
    rounded-tile ("any") form — the maskable PNGs (icon-192/512,
    apple-touch-icon) are generated full-bleed from the same geometry.
  -->
  <defs>
    <linearGradient id="stroke" x1="0" y1="120" x2="0" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#48B6FF" />
      <stop offset="1" stop-color="#0B74BD" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="#0f172a" />
  <g
    stroke="url(#stroke)"
    stroke-width="44"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  >
    <!-- vertical spine -->
    <line x1="170" y1="120" x2="170" y2="392" />
    <!-- upper bow (the "glyph" head) -->
    <path d="M 170 160 C 320 160, 360 296, 220 296" />
    <!-- trailing stream line, offset right -->
    <line x1="240" y1="364" x2="356" y2="364" />
  </g>
</svg>

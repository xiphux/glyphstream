<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    GlyphStream placeholder icon. A monogram "GS" rendered in white on a
    dark slate square with rounded corners. Square base with a generous
    safe area so iOS / Android maskable variants both crop without
    clipping the glyphs. Replace with branded artwork before shipping.
  -->
  <rect width="512" height="512" rx="96" fill="#0f172a" />
  <text
    x="256"
    y="256"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="220"
    font-weight="800"
    fill="#f8fafc"
    text-anchor="middle"
    dominant-baseline="central"
    letter-spacing="-12"
  >GS</text>
</svg>
